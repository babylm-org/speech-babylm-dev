[workspace]
authors = ["gifdog97 <omusubset.s@gmail.com>"]
channels = ["conda-forge"]
name = "speech-babylm-dev"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
download-childes-data = "python src/dataset/download_talkbank_data.py --corpus-name childes --subset-name Eng-AAE Eng-NA Eng-UK"
download-phonbank-data = "python src/dataset/download_talkbank_data.py --corpus-name phon --subset-name Eng-NA Eng-UK"
extract-childes-metadata = "python src/dataset/extract_metadata.py --output_path src/dataset/output/childes_metadata.csv"
run-babyslm-example = "python -m src.babyslm.run_example"

[dependencies]
python = "3.12.*"
pandas = ">=3.0.2,<4"
tqdm = ">=4.67.3,<5"
transformers = ">=5.5.4,<6"
pyprind = ">=2.11.3,<3"

[pypi-dependencies]
browser-cookie3 = ">=0.20.1, <0.21"
tbdb = { git = "https://github.com/TalkBank/TBDBpy" }
soundfile = ">=0.13.1, <0.14"
torch = "*"
